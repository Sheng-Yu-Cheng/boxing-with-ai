name: radarbox

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.13
  - pip
  - numpy
  - scipy
  - matplotlib

  # MediaPipe and OpenCV are installed by pip because the tested Windows
  # environment uses MediaPipe 0.10.35 and OpenCV 4.13 wheels.
  - pip:
      - mediapipe==0.10.35
      - opencv-contrib-python==4.13.0.92
